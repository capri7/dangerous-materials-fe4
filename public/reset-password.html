<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>パスワード再設定 - 乙種4類危険物取扱者試験対策</title>
  <link rel="stylesheet" href="css/site.css" />
  <link rel="stylesheet" href="/css/hamburger.css" />
  <style>
    /* 見出しを login/signup と同トーンに */
    .auth-card h2 { font-size: var(--fs-h1); letter-spacing: .02em; margin: 0 0 16px; }
    .form-feedback { min-height:1.2em; font-size:.95rem; margin:8px 0 2px; }
    .form-feedback.ok{ color:#047857; }
    .form-feedback.error{ color:#dc2626; }
    .secure-note{ display:flex; align-items:center; gap:8px; color:#6b7280; margin:4px 0 16px; }
    .secure-note .icon{ font-size:1.05rem; }
    .hidden{ display:none !important; }
  </style>
</head>

<body>
  <header class="site-header">
    <div class="header-container">
      <a href="index.html"><img src="/images/logo.svg" alt="ロゴ" class="logo" /></a>
      <h1 class="site-title">乙種4類危険物取扱者試験対策</h1>
      <button class="hamburger" aria-label="メニュー開閉" aria-expanded="false" aria-controls="site-nav" type="button">
        <span></span><span></span><span></span></button>
    </div>
    <nav class="nav-links" id="site-nav" aria-label="メインメニュー">
      <a href="index.html">トップ</a>
      <a href="/basics/index.html">基礎知識</a>
      <a href="/contents/index.html">練習問題</a>
      <a href="login.html">ログイン</a>
    </nav>
  </header>

  <main class="site-main">
    <div class="auth-card">
      <h2>新しいパスワードを設定</h2>
      <p class="secure-note">
        <span class="icon">🔒</span><span>安全に送信されます</span>
      </p>
      <p id="link-warning" class="form-feedback error hidden" role="alert">
      リンクが無効、または有効期限切れの可能性があります。メールからもう一度お試しください。
      </p>

      <form id="reset-form" novalidate aria-busy="false">
         <label for="new-password" class="sr-only">新しいパスワード</label>
         <input
          type="password"
          id="new-password"
          placeholder="新しいパスワード（6文字以上）"
          autocomplete="new-password"
          minlength="6"
          required
          aria-describedby="reset-feedback"
         />

        <label for="new-password-confirm" class="sr-only">新しいパスワード（確認）</label>
        <input
          type="password"
          id="new-password-confirm"
          placeholder="確認のためもう一度入力"
          autocomplete="new-password"
          minlength="6"
          required
          aria-describedby="reset-feedback"
        />

        <button id="reset-submit" type="submit">更新する</button>
        <p id="reset-feedback" class="form-feedback" role="status" aria-live="polite"></p>
      </form>

      <p class="small-link">
        設定後は <a href="login.html">ログイン</a> へお進みください
      </p>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <p class="copyright">© 2025 乙種4類危険物取扱者試験対策</p>
      <div class="legal-links">
        <a href="/privacy.html" class="footer-link">プライバシーポリシー</a><span>／</span>
        <a href="/terms.html" class="footer-link">利用規約</a>
      </div>
    </div>
  </footer>

  <script type="module" src="/js/supabaseClient.js" defer></script>
  <script type="module" src="/js/reset-password.js"></script>
  <script type="module" src="/js/nav.js" defer></script>
  <script type="module" src="/js/nav-toggle.js" defer></script>
</body>
</html>

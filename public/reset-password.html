    .form-feedback.error{ color:#dc2626; }

<body>
  <header class="site-header">
    <div class="header-container">
      <a href="/"><img src="/images/logo.svg" alt="危険物乙4試験対策サイト" class="logo" /></a>
      <h1 class="site-title">乙種4類危険物取扱者試験対策</h1>
      <button class="hamburger" aria-label="メニュー開閉" aria-expanded="false" aria-controls="site-nav" type="button">

    </div>

    </nav>
  </header>

  <main class="site-main">
    <div class="auth-card">
      <h2>新しいパスワードを設定</h2>
      <p class="secure-note">
        <span class="icon">🔒</span><span>安全に送信されます</span>
      </p>
      <p id="link-warning" class="form-feedback error hidden" role="alert">
      リンクが無効、または有効期限切れの可能性があります。メールからもう一度お試しください。
      </p>

      <form id="reset-form" novalidate aria-busy="false">
         <label for="new-password" class="sr-only">新しいパスワード</label>
         <input
          type="password"
          id="new-password"
          placeholder="新しいパスワード（6文字以上）"
          autocomplete="new-password"
          minlength="6"
          required
          aria-describedby="reset-feedback"
         />

        <label for="new-password-confirm" class="sr-only">新しいパスワード（確認）</label>
        <input
          type="password"
          id="new-password-confirm"
          placeholder="確認のためもう一度入力"
          autocomplete="new-password"
          minlength="6"
          required
          aria-describedby="reset-feedback"
        />

        <button id="reset-submit" type="submit">更新する</button>
        <p id="reset-feedback" class="form-feedback" role="status" aria-live="polite"></p>
      </form>

      <p class="small-link">
        設定後は <a href="login.html">ログイン</a> へお進みください
      </p>
    </div>
  </main>

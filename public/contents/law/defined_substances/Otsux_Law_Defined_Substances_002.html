<div class="mistake-note-box" data-testid="mistake-note-box" style="position:fixed;right:16px;bottom:16px;padding:12px;background:#fff;border:1px solid #ccc;border-radius:8px;z-index:9999">

</div>

<script type="module">
  // --- Supabase の準備待ち ---
  const sleep = (ms)=>new Promise(r=>setTimeout(r,ms));
  async function waitSupabase(timeout=10000){
    const t0 = performance.now();
    while(!(window.supabase?.from) && performance.now()-t0 < timeout){
      await sleep(50);
    }
    if(!window.supabase?.from) throw new Error('Supabase not ready');
  }
  await waitSupabase();  // ← ここで必ず window.supabase が使える状態になる

  // --- ここから元のロジック（少しだけ強化版） ---
  const bodyQid = document.body.getAttribute('data-question-id') || '';
  const pathQid = location.pathname.split('/').pop()?.replace(/\.html$/i,'') || '';
  const qid = bodyQid || pathQid;  // data属性があれば優先
  const ta = document.getElementById('mistake-note');
  const btn = document.getElementById('mistake-save');
  const status = document.getElementById('mistake-status');

  // 自分の user_id（RLS対策で利用）
  const { data: u } = await window.supabase.auth.getUser();
  const uid = u?.user?.id ?? null;

  async function loadLatest() {
    const { data, error } = await window.supabase
      .from('mistakes')
      .select('id, notes, user_id')
      .eq('question_id', qid)
      .order('last_seen_at', { ascending: false })
      .single();
    if (error) throw error;
    const rec = data?.[0];
    if (rec?.notes) ta.value = rec.notes;
    return rec?.id || null;
  }

  let currentId = await loadLatest();

  const debounce = (fn, ms) => { let t; return (...a)=>(clearTimeout(t), t=setTimeout(()=>fn(...a), ms)); };

  async function save() {
    const text = ta.value.trim();
    if (!text) return;

    try {
      let q;
      if (currentId) {
        // UPDATE は RLS の USING with_check を満たすために user_id も絞ると安全
        q = window.supabase.from('mistakes').update({ notes: text }).eq('id', currentId);
        if (uid) q = q.eq('user_id', uid);
      } else {
        // INSERT は RLS によっては user_id 必須のことがある（トリガ無し想定で送る）
        const payload = uid ? { question_id: qid, notes: text, user_id: uid }
                            : { question_id: qid, notes: text };
        q = window.supabase.from('mistakes').insert(payload);
      }
      const { data, error } = await q.select('id').limit(1);
      if (error) throw error;
      currentId = data?.[0]?.id ?? currentId;

      status.textContent = '保存しました';
    } catch (e) {
      console.error(e);
      status.textContent = '保存に失敗';
      window.__mistake_last_error__ = (e && e.message) ? e.message : String(e); 
    } finally {
      setTimeout(() => (status.textContent = ''), 1200);
    }
  }

  ta.addEventListener('input', debounce(save, 800));
  btn.addEventListener('click', save);
  window.__mistake_ready__ = true;
</script>

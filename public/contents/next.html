  <script type="module">
    import { supabase } from '/js/supabaseClient.js';
    import { getCategoryPath } from '/js/dataLoader.js';

    const ACTIVE_STATUSES = ['active','trialing','past_due'];
    function isSubscriptionActive(row) {
      if (!row) return false;
      const expTs = row.current_period_end ? Date.parse(row.current_period_end) : NaN;
      if (Number.isFinite(expTs) && (expTs + 60_000) > Date.now()) return true; // 60秒グレース
      const status = String(row.subscription_status || '').toLowerCase();
      return ACTIVE_STATUSES.includes(status);
    }

    async function main() {
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) { location.replace('/login.html'); return; }
      const uid = session.user.id;

        // サブスク状態
      const { data: prof } = await supabase
        .from('user_profiles')
        .select('subscription_status,current_period_end')
        .eq('user_id', uid)
        .maybeSingle();

      // 非会員（または期限切れ）は完了ページへ戻す
      if (!isSubscriptionActive(prof)) {
        location.replace('/complete.html');
        return;
      }

      // まだ解いていない有料問題のうち先頭へ
      const [{ data: paidList }, { data: answered }] = await Promise.all([
        supabase.from('questions').select('id').eq('is_paid', true).order('id', { ascending: true }),
        supabase.from('user_progress')
          .select('question_id, questions!inner(is_paid)')
          .eq('user_id', uid)
          .eq('questions.is_paid', true),
      ]);

        const solved = new Set((answered || []).map(r => r.question_id));
      const firstUnsolved = (paidList || []).find(q => !solved.has(q.id))?.id
                         ?? (paidList || [])[0]?.id;

      if (!firstUnsolved) { location.replace('/mypage.html'); return; }

      const path = await getCategoryPath(firstUnsolved);
      location.replace(`/contents/${path}/${firstUnsolved}.html?mode=paid`);
    }

    main().catch(err => {
      console.error('next.html error:', err);
      alert('次の問題を開けませんでした。マイページへ移動します。');
      location.replace('/mypage.html');
    });
  </script>
